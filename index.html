<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>⊞ grink</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Helvetica Neue',Arial,sans-serif;font-size:13px;background:#fff;color:#000;padding:40px}body.grid-only{padding:20px}h1{font-size:13px;font-weight:normal;margin-bottom:24px}#u{width:100%;font-family:inherit;font-size:13px;border:none;outline:none;padding:0 0 6px;resize:none;overflow:hidden;line-height:1.7;min-height:28px;display:block}.row{display:flex;gap:20px;align-items:flex-end;margin-bottom:6px}.row.hidden{display:none}h1.hidden{display:none}p.hidden{display:none}.row button{font-family:inherit;font-size:13px;background:0;border:0;cursor:pointer;color:#000}.row button:hover{text-decoration:underline}#msg{font-size:12px;color:#999;margin-bottom:0;min-height:16px}#msg span{color:#000;cursor:pointer;text-decoration:underline}#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(var(--size,200px),1fr));gap:1px;background:#e0e0e0;border:1px solid #e0e0e0}#size{width:150px;height:5px;border-radius:5px;background:#ddd;outline:0;-webkit-appearance:none;appearance:none}#size::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;background:#000;cursor:pointer}#size::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#000;cursor:pointer;border:none}.card{background:#fff;overflow:visible;position:relative}.card a{display:block;text-decoration:none;color:#000}.card .remove-btn{position:absolute;top:6px;right:6px;width:28px;height:28px;background:#000;color:#fff;border:none;border-radius:50%;font-size:18px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s;font-weight:bold;padding:0}.card:hover .remove-btn{opacity:1}.card .remove-btn:hover{background:#333}.card .move-up-btn,.card .move-down-btn,.card .remove-btn{position:absolute;top:8px;background:#fff;color:#000;border:none;border-radius:0;font-size:14px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s;font-weight:normal;padding:0;width:20px;height:20px}.card .move-up-btn{right:70px}.card .move-down-btn{right:42px}.card .remove-btn{right:14px}.card:hover .move-up-btn,.card:hover .move-down-btn,.card:hover .remove-btn{opacity:1}.card .move-up-btn:hover,.card .move-down-btn:hover,.card .remove-btn:hover{background:#f0f0f0}.card.dragging{opacity:0.5}.card.drag-over{background:#f0f0f0}.card img{width:100%;display:block;aspect-ratio:16/9;object-fit:cover}.card img:hover{filter:brightness(1.1)}.card .np{aspect-ratio:16/9;background:#f5f5f5}.card .info{padding:8px 9px 10px}.card .dm{font-size:10px;color:#999;margin-bottom:2px}.card .tt{font-size:12px;line-height:1.35;cursor:text}body.grid-only .card .tt{cursor:pointer}.card .tt:empty::before{content:attr(data-placeholder);color:#ccc}.card.loading .np{background:repeating-linear-gradient(90deg,#f0f0f0 0,#e8e8e8 50%,#f0f0f0 100%);background-size:200%;animation:s 1.2s linear infinite}.card.loading .dm,.card.loading .tt{background:repeating-linear-gradient(90deg,#f0f0f0 0,#e8e8e8 50%,#f0f0f0 100%);background-size:200%;animation:s 1.2s linear infinite}@keyframes s{0%{background-position:200% 0}to{background-position:-200% 0}}#editBtn{display:none;position:fixed;top:20px;right:20px;font-family:inherit;font-size:13px;background:0;border:0;cursor:pointer;color:#000;text-decoration:underline;z-index:1000}body.grid-only #editBtn{display:block}.loading .tt{color:#ddd;background:#ddd;border-radius:2px}@keyframes s{0%{background-position:200%}to{background-position:-200%}}#gt-container{display:none;margin-bottom:20px}#gt{width:100%;font-family:inherit;font-size:16px;border:none;border-bottom:2px solid #000;outline:none;padding:0 0 8px;font-weight:500}#gd{width:100%;font-family:inherit;font-size:13px;border:none;border-bottom:1px solid #ccc;outline:none;padding:0 0 6px;margin-top:8px;color:#666;resize:none;overflow:hidden;line-height:1.5;min-height:20px;max-height:150px;display:block}
</style>
<script src="https://cdn.jsdelivr.net/npm/pako@2/dist/pako.min.js"></script>
</head>
<body>

<h1><b>⊞ grink:</b> a URL-based link grid generator</h1>
<p style="font-size:12px;color:#666;margin-bottom:20px;margin-top:-20px">Add any number of links in the text box, click "build", select grid size, give it a title and description if you want, then copy the link to share it.</p>

<div class="row">
  <textarea id="u" rows="1" placeholder="add urls here…"></textarea>
</div>
<div class="row">
  <span style="font-size:12px;color:#999">size:</span>
  <input id="size" type="range" min="150" max="350" value="200">
</div>
<div class="row">
  <button id="buildBtn">▶ build</button>
</div>
<div id="msg"></div>
<div class="row" style="margin-bottom:20px">
  <button id="copyBtn" style="display:none">↣ copy link</button>
</div>
<button id="editBtn">✎ edit</button>
<div id="gt-container"><input id="gt" type="text" placeholder="grid title"><textarea id="gd" placeholder="add a description (optional)"></textarea></div>
<div id="grid"></div>

<script>
const el = (id) => document.getElementById(id);
const ta = el('u'), gt = el('gt'), gd = el('gd'), msg = el('msg'), grid = el('grid'), gtc = el('gt-container'), editBtn = el('editBtn'), copyBtn = el('copyBtn');
const sizeSlider = el('size');

sizeSlider.addEventListener('input', () => document.documentElement.style.setProperty('--size', sizeSlider.value + 'px'));

const resize = () => ta.style.height = ta.scrollHeight + 'px';
ta.addEventListener('input', () => {
  if (/(https?:\/\/|[a-z0-9.-]+\.)[^\s\n]*$/.test(ta.value.trim())) ta.value += '\n';
  resize();
});

gd.addEventListener('input', () => {
  gd.style.height = 'auto';
  gd.style.height = Math.min(gd.scrollHeight, 150) + 'px';
});

const dm = u => {try{return new URL(u).hostname.replace(/^www\./,'')}catch{return u}};
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const hslToRgb = (h, s, l) => {
  const c = (1 - Math.abs(2 * l - 1)) * s, x = c * (1 - Math.abs((h / 60) % 2 - 1));
  let r1, g1, b1;
  if (h < 60) [r1, g1, b1] = [c, x, 0];
  else if (h < 120) [r1, g1, b1] = [x, c, 0];
  else if (h < 180) [r1, g1, b1] = [0, c, x];
  else if (h < 240) [r1, g1, b1] = [0, x, c];
  else if (h < 300) [r1, g1, b1] = [x, 0, c];
  else [r1, g1, b1] = [c, 0, x];
  const m = l - c / 2;
  return [Math.round((r1 + m) * 255), Math.round((g1 + m) * 255), Math.round((b1 + m) * 255)];
};

function generatePixelArt(url) {
  let hash = 0;
  for (let i = 0; i < url.length; i++) hash = ((hash << 5) - hash) + url.charCodeAt(i);
  
  const vowels = (url.match(/[aeiou]/gi) || []).length;
  const slashes = (url.match(/\//g) || []).length;
  const colons = (url.match(/:/g) || []).length;
  
  const canvas = document.createElement('canvas');
  canvas.width = 200; canvas.height = 112;
  const ctx = canvas.getContext('2d');
  let seed = Math.abs(hash);
  const rand = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };
  
  const clustering = 0.3 + (slashes % 10) * 0.05;
  const clusterSize = 1 + (colons % 4);
  const baseHue = ((Math.abs(hash) % 360) + (Math.abs(hash * 73) % 360) + (Math.abs(hash * 37) % 360)) / 3;
  const sat = (50 + (vowels % 30)) / 100;
  const narrow = Math.max(0, 1 - url.length / 100);
  const minL = (narrow * 40) / 100, maxL = (100 - narrow * 40) / 100;
  
  for (let y = 0; y < 22; y++) {
    let [lastR, lastG, lastB] = [128, 128, 128];
    let cluster = 0;
    for (let x = 0; x < 40; x++) {
      let [r, g, b] = [lastR, lastG, lastB];
      if (rand() < clustering && cluster < clusterSize) {
        r = Math.max(0, Math.min(255, lastR + (rand() - 0.5) * 100));
        g = Math.max(0, Math.min(255, lastG + (rand() - 0.5) * 100));
        b = Math.max(0, Math.min(255, lastB + (rand() - 0.5) * 100));
        cluster++;
      } else {
        cluster = 0;
        const l = minL + rand() * (maxL - minL);
        [r, g, b] = hslToRgb((baseHue + rand() * 360) % 360, sat, l);
      }
      [lastR, lastG, lastB] = [r, g, b];
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.fillRect(x * 5, y * 5.09, 5.1, 5.1);
    }
  }
  return canvas.toDataURL();
}

async function fetchMeta(url) {
  try {
    const ctl = new AbortController();
    const tid = setTimeout(() => ctl.abort(), 8000);
    const res = await fetch(`https://api.microlink.io?url=${encodeURIComponent(url)}`, {signal: ctl.signal});
    clearTimeout(tid);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const d = await res.json();
    if (!d.data) throw new Error('No data');
    return {title: d.data.title || dm(url), image: d.data.image?.url || null};
  } catch (e) {
    console.warn('✗', url, e.message);
    return {title: dm(url), image: null};
  }
}

const parseUrls = () => ta.value.split('\n').map(s => s.trim()).filter(s => s).map(s => /^https?:\/\//i.test(s) ? s : 'https://' + s);

function removeCard(e) {
  e.stopPropagation();
  const btn = e.target.closest('.remove-btn');
  const card = btn.closest('.card');
  const cardId = card.id;
  const index = parseInt(cardId.replace('c', ''));
  
  // Get current URLs
  const urls = parseUrls();
  
  // Remove the URL at the index
  if (index >= 0 && index < urls.length) {
    urls.splice(index, 1);
    ta.value = urls.join('\n');
    if (urls.length > 0) ta.value += '\n';
    resize();
  }
  
  // Remove the card from the grid
  card.remove();
}

function updateTextareaFromGrid() {
  const cards = [...grid.querySelectorAll('.card')];
  const urls = cards.map(card => {
    const link = card.querySelector('a');
    return link ? link.href : '';
  }).filter(url => url);
  ta.value = urls.join('\n');
  if (urls.length > 0) ta.value += '\n';
  resize();
}

let draggedCard = null;
let draggedOverCard = null;

function moveCardUp(e) {
  e.stopPropagation();
  const btn = e.target.closest('.move-up-btn');
  const card = btn.closest('.card');
  const prev = card.previousElementSibling;
  if (prev) {
    grid.insertBefore(card, prev);
    updateTextareaFromGrid();
  }
}

function moveCardDown(e) {
  e.stopPropagation();
  const btn = e.target.closest('.move-down-btn');
  const card = btn.closest('.card');
  const next = card.nextElementSibling;
  if (next) {
    grid.insertBefore(next, card);
    updateTextareaFromGrid();
  }
}

function setupMoveHandlers(card) {
  const upBtn = card.querySelector('.move-up-btn');
  const downBtn = card.querySelector('.move-down-btn');
  if (upBtn) upBtn.addEventListener('click', moveCardUp);
  if (downBtn) downBtn.addEventListener('click', moveCardDown);
}

async function go() {
  const urls = parseUrls();
  if (!urls.length) return;
  gtc.style.display = 'block';
  grid.innerHTML = urls.map((_, i) => `<div class="card loading" id="c${i}"><div class="np"></div><div class="info"><div class="dm">&nbsp;</div><div class="tt">&nbsp;</div></div><button class="move-up-btn" title="Move up">↑</button><button class="move-down-btn" title="Move down">↓</button><button class="remove-btn" data-index="${i}" title="Remove">✕</button></div>`).join('');
  msg.textContent = `⧗ 0 / ${urls.length}`;
  copyBtn.style.display = 'none';
  let done = 0;
  
  await Promise.all(urls.map(async (url, i) => {
    const meta = await fetchMeta(url);
    const imgSrc = meta.image || generatePixelArt(url);
    el('c' + i).innerHTML = `<a href="${esc(url)}" target="_blank" rel="noopener"><img src="${esc(imgSrc)}" alt=""><div class="info"><div class="dm">${esc(dm(url))}</div><div class="tt" contenteditable data-placeholder="add description…">${esc(meta.title)}</div></div></a><button class="move-up-btn" title="Move up">↑</button><button class="move-down-btn" title="Move down">↓</button><button class="remove-btn" data-index="${i}" title="Remove">✕</button>`;
    el('c' + i).className = 'card';
    el('c' + i).querySelector('.remove-btn').addEventListener('click', removeCard);
    setupMoveHandlers(el('c' + i));
    msg.textContent = `⧗ ${++done} / ${urls.length}`;
  }));
  
  copyBtn.style.display = 'block';
  copyBtn.textContent = '↣ copy link';
  copyBtn.addEventListener('click', generateShareLink);
}

function generateShareLink() {
  const urls = parseUrls();
  const titles = [...document.querySelectorAll('.tt')].map((el, i) => {
    const title = el.textContent || '';
    return title !== dm(urls[i]) ? title : null;
  });
  const json = JSON.stringify({urls, titles, gridTitle: gt.value, description: gd.value});
  const compressed = pako.deflate(json);
  const binary = String.fromCharCode.apply(null, compressed);
  const enc = btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
  const url = `${location.origin}${location.pathname}?g=${enc}&s=${sizeSlider.value}`;
  navigator.clipboard.writeText(url).then(() => {
    copyBtn.textContent = '✓ copied';
    setTimeout(() => { copyBtn.textContent = '⎘ copy link'; }, 1000);
  });
}

const clearAll = () => {
  ta.value = gt.value = gd.value = '';
  grid.innerHTML = '';
  gtc.style.display = 'none';
  msg.innerHTML = '';
  copyBtn.style.display = 'none';
  resize();
};

el('buildBtn').addEventListener('click', go);
editBtn.addEventListener('click', editGrid);

document.querySelectorAll('.tt').forEach(el => el.addEventListener('blur', function() {
  if (!this.textContent.trim()) this.textContent = '';
}));

const decodeGridData = (encoded) => {
  const padding = (4 - (encoded.length % 4)) % 4;
  const padded = encoded + '='.repeat(padding);
  const binary = atob(padded.replace(/-/g, '+').replace(/_/g, '/'));
  const compressed = Uint8Array.from(binary, c => c.charCodeAt(0));
  const json = pako.inflate(compressed, {to: 'string'});
  return JSON.parse(json);
};

function editGrid() {
  const params = new URLSearchParams(location.search);
  const g = params.get('g');
  if (!g) return;
  
  try {
    const data = decodeGridData(g);
    
    ta.value = (data.urls || []).join('\n');
    gt.value = data.gridTitle || '';
    gd.value = data.description || '';
    resize();
    gd.dispatchEvent(new Event('input'));
    
    document.body.classList.remove('grid-only');
    document.querySelector('h1').classList.remove('hidden');
    document.querySelector('p').classList.remove('hidden');
    [...document.querySelectorAll('.row')].forEach(r => r.classList.remove('hidden'));
    msg.style.display = 'block';
    msg.innerHTML = '';
    grid.innerHTML = '';
    gtc.style.display = 'none';
    editBtn.style.display = 'none';
    
    ta.focus();
  } catch (e) {
    console.error('Failed to restore grid for editing:', e);
  }
}

(() => {
  const params = new URLSearchParams(location.search);
  const g = params.get('g'), s = params.get('s');
  if (!g) return;
  
  document.body.classList.add('grid-only');
  document.querySelector('h1').classList.add('hidden');
  document.querySelector('p').classList.add('hidden');
  [...document.querySelectorAll('.row')].forEach(r => r.classList.add('hidden'));
  msg.style.display = 'none';
  if (s) {sizeSlider.value = s; document.documentElement.style.setProperty('--size', s + 'px');}
  
  try {
    const data = decodeGridData(g);
    gtc.style.display = 'block';
    gtc.innerHTML = '';
    if (data.gridTitle) gtc.innerHTML += `<h2 style="font-size:18px;font-weight:500;margin:0 0 8px;border:none">${esc(data.gridTitle)}</h2>`;
    if (data.description) gtc.innerHTML += `<p style="font-size:13px;color:#666;margin:0 0 20px;line-height:1.5;border:none">${esc(data.description).replace(/\n/g, '<br>')}</p>`;
    const urls = data.urls || [];
    grid.innerHTML = urls.map((_, i) => `<div class="card loading" id="c${i}"><div class="np"></div><div class="info"><div class="dm">&nbsp;</div><div class="tt">&nbsp;</div></div></div>`).join('');
    Promise.all(urls.map(async (url, i) => {
      const meta = await fetchMeta(url);
      const imgSrc = meta.image || generatePixelArt(url);
      const title = data.titles?.[i] || meta.title;
      el('c' + i).innerHTML = `<a href="${esc(url)}" target="_blank" rel="noopener"><img src="${esc(imgSrc)}" alt=""><div class="info"><div class="dm">${esc(dm(url))}</div><div class="tt">${esc(title)}</div></div></a>`;
      el('c' + i).className = 'card';
    }));
  } catch (e) {
    console.error('Failed to load grid:', e);
    grid.innerHTML = '<p style="color:#999">Failed to load grid</p>';
  }
})();
</script>
</body>
</html>
