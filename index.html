<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>grink</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Helvetica Neue',Arial,sans-serif;font-size:13px;background:#fff;color:#000;padding:40px}body.grid-only{padding:20px}h1{font-size:13px;font-weight:normal;margin-bottom:24px}#u{width:100%;font-family:inherit;font-size:13px;border:none;border-bottom:1px solid #000;outline:none;padding:0 0 6px;resize:none;overflow:hidden;line-height:1.7;min-height:28px;display:block}.row{display:flex;gap:20px;align-items:flex-end;margin-bottom:6px}.row.hidden{display:none}h1.hidden{display:none}p.hidden{display:none}.row button{font-family:inherit;font-size:13px;background:0;border:0;cursor:pointer;color:#000}.row button:hover{text-decoration:underline}#msg{font-size:12px;color:#999;margin-bottom:28px;min-height:16px}#msg span{color:#000;cursor:pointer;text-decoration:underline}#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(var(--size,200px),1fr));gap:1px;background:#e0e0e0;border:1px solid #e0e0e0}#size{width:150px;height:5px;border-radius:5px;background:#ddd;outline:0;-webkit-appearance:none;appearance:none}#size::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;background:#000;cursor:pointer}#size::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#000;cursor:pointer;border:none}.card{background:#fff;overflow:hidden}.card a{display:block;text-decoration:none;color:#000}.card img{width:100%;display:block;aspect-ratio:16/9;object-fit:cover;filter:grayscale(100%)}.card img:hover{filter:none}.card .np{aspect-ratio:16/9;background:#f5f5f5}.card .info{padding:8px 9px 10px}.card .dm{font-size:10px;color:#999;margin-bottom:2px}.card .tt{font-size:12px;line-height:1.35}.card.loading .np{background:repeating-linear-gradient(90deg,#f0f0f0 0,#e8e8e8 50%,#f0f0f0 100%);background-size:200%;animation:s 1.2s linear infinite}.card.loading .dm,.card.loading .tt{color:#ddd;background:#ddd;border-radius:2px}@keyframes s{0%{background-position:200%}100%{background-position:-200%}}
</style>
</head>
<body>

<h1><b>⊞ grink:</b> a URL-based link grid generator</h1>
<p style="font-size:12px;color:#666;margin-bottom:20px;margin-top:-20px">Paste any number of links in the text box, select grid size, click "build", then copy the link to share it.</p>

<div class="row">
  <textarea id="u" rows="1" placeholder="paste urls here…"></textarea>
</div>
<div class="row">
  <span style="font-size:12px;color:#999">size:</span>
  <input id="size" type="range" min="150" max="350" value="200">
</div>
<div class="row">
  <button onclick="go()">▶ build</button>
  <button onclick="clearAll()">⊘ clear</button>
</div>
<div id="msg"></div>
<div id="grid"></div>

<script>
const ta = document.getElementById('u');
const msg = document.getElementById('msg');
const sizeSlider = document.getElementById('size');
sizeSlider?.addEventListener('input', () => document.documentElement.style.setProperty('--size', sizeSlider.value + 'px'));

const resize = () => ta.style.height = ta.scrollHeight + 'px';
ta.addEventListener('input', () => {
  if (/https?:\/\/\S{4,}[^\s\n]$/.test(ta.value)) {
    ta.value += '\n';
    ta.setSelectionRange(ta.value.length, ta.value.length);
  }
  resize();
});
ta.addEventListener('keydown', () => setTimeout(resize, 0));

const proxies = [u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`, u => `https://corsproxy.io/?${encodeURIComponent(u)}`];
const dm = u => {try{return new URL(u).hostname.replace(/^www\./,'')}catch{return u}};
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function generatePixelArt(url) {
  let hash = 0;
  for (let i = 0; i < url.length; i++) {
    hash = ((hash << 5) - hash) + url.charCodeAt(i);
    hash = hash & hash;
  }
  const canvas = document.createElement('canvas');
  canvas.width = 200;
  canvas.height = 112;
  const ctx = canvas.getContext('2d');
  let seed = Math.abs(hash);
  const random = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };
  const cols = 40, rows = 22;
  const px = 200 / cols;
  const py = 112 / rows;
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const v = Math.floor(random() * 256);
      ctx.fillStyle = `rgb(${v},${v},${v})`;
      ctx.fillRect(x * px, y * py, px, py);
    }
  }
  return canvas.toDataURL();
}

async function fetchMeta(url) {
  for (const p of proxies) {
    try {
      const r = await fetch(p(url), { signal: AbortSignal.timeout(7000) });
      if (!r.ok) continue;
      const html = (await r.json()).contents || await r.text();
      if (typeof html !== 'string') continue;
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const g = (s, a) => doc.querySelector(s)?.getAttribute(a)?.trim() || '';
      const title = g('meta[property="og:title"]','content') || g('meta[name="twitter:title"]','content') || doc.title || dm(url);
      return { title };
    } catch {}
  }
  return { title: dm(url) };
}

async function go() {
  const urls = ta.value.split('\n').map(s => s.trim()).filter(s => /^https?:\/\//i.test(s));
  if (!urls.length) return;
  const grid = document.getElementById('grid');
  grid.innerHTML = urls.map((_, i) => `<div class="card loading" id="c${i}"><div class="np"></div><div class="info"><div class="dm">&nbsp;</div><div class="tt">&nbsp;</div></div></div>`).join('');
  msg.textContent = `⧗ 0 / ${urls.length}`;
  let done = 0;
  
  await Promise.all(urls.map(async (url, i) => {
    const m = await fetchMeta(url);
    document.getElementById('c' + i).innerHTML = `<a href="${esc(url)}" target="_blank" rel="noopener"><img src="${generatePixelArt(url)}" alt=""><div class="info"><div class="dm">${esc(dm(url))}</div><div class="tt">${esc(m.title)}</div></div></a>`;
    document.getElementById('c' + i).className = 'card';
    msg.textContent = `⧗ ${++done} / ${urls.length}`;
  }));
  
  const enc = btoa(unescape(encodeURIComponent(urls.join('\n'))));
  msg.innerHTML = `<span onclick="navigator.clipboard.writeText(this.dataset.u).then(()=>this.textContent='✓ copied')" data-u="${esc(`${location.origin}${location.pathname}?g=${enc}`)}">⎘ copy link</span>`;
}

const clearAll = () => {
  ta.value = '';
  resize();
  document.getElementById('grid').innerHTML = '';
  msg.innerHTML = '';
};

(() => {
  const g = new URLSearchParams(location.search).get('g');
  if (!g) return;
  document.body.classList.add('grid-only');
  document.querySelector('h1').classList.add('hidden');
  document.querySelector('p').classList.add('hidden');
  document.querySelectorAll('.row').forEach(r => r.classList.add('hidden'));
  document.getElementById('msg').style.display = 'none';
  try { ta.value = decodeURIComponent(escape(atob(g))); resize(); go(); } catch {}
})();
</script>
</body>
</html>
